<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MathStudyApp</title>
    <link rel="stylesheet" href="styles.css">
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [["\\(", "\\)"]],
          displayMath: [["\\[", "\\]"]]
        },
        svg: {
          fontCache: "global"
        }
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">University Mathematics</p>
        <h1>MathStudyApp</h1>
      </div>
      <div class="summary" aria-label="学習サマリー">
        <span><strong id="totalAttempts">0</strong>問</span>
        <span><strong id="accuracyRate">0%</strong>正答</span>
        <span><strong id="reviewCount">0</strong>復習</span>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar" aria-label="分野とモード">
        <section class="panel">
          <h2>分野</h2>
          <div id="subjectList" class="subject-list"></div>
        </section>

        <section class="panel">
          <h2>セクション</h2>
          <div id="sectionList" class="section-list"></div>
        </section>

        <section class="panel">
          <h2>学習モード</h2>
          <div class="mode-tabs" role="tablist" aria-label="学習モード">
            <button class="mode-button active" type="button" data-mode="practice">演習</button>
            <button class="mode-button" type="button" data-mode="review">復習</button>
            <button class="mode-button" type="button" data-mode="history">記録</button>
          </div>
        </section>
      </aside>

      <section class="workspace" aria-live="polite">
        <div class="workspace-head">
          <div>
            <p id="currentSubjectLabel" class="eyebrow">線形代数</p>
            <h2 id="modeTitle">問題演習</h2>
            <p id="currentSectionLabel" class="section-label">1. ベクトルと一次独立</p>
          </div>
          <div class="filters">
            <label>
              難易度
              <select id="difficultyFilter">
                <option value="all">すべて</option>
                <option value="basic">基本</option>
                <option value="standard">標準</option>
                <option value="advanced">発展</option>
              </select>
            </label>
            <label>
              問題タイプ
              <select id="problemTypeFilter">
                <option value="all">すべて</option>
                <option value="calculation">計算</option>
                <option value="concept">概念</option>
              </select>
            </label>
            <button id="resetDataButton" class="ghost-button" type="button" title="学習記録をリセット">↺</button>
          </div>
        </div>

        <div id="practiceView" class="view active">
          <article class="problem-card">
            <div class="problem-meta">
              <span id="problemSection"></span>
              <span id="problemTopic"></span>
              <span id="problemDifficulty"></span>
              <span id="problemType"></span>
            </div>
            <h3 id="problemTitle"></h3>
            <p id="problemPrompt" class="problem-prompt"></p>
            <section id="termPanel" class="term-panel" aria-label="用語確認"></section>
            <div id="answerChoices" class="answer-choices"></div>
            <div class="actions">
              <button id="submitAnswerButton" class="primary-button" type="button">解答する</button>
              <button id="nextProblemButton" class="secondary-button" type="button">次の問題</button>
            </div>
            <div id="feedback" class="feedback hidden"></div>
          </article>
        </div>

        <div id="reviewView" class="view">
          <div id="reviewList" class="review-list"></div>
        </div>

        <div id="historyView" class="view">
          <div class="stats-grid">
            <div class="stat-card">
              <span>総演習数</span>
              <strong id="historyTotal">0</strong>
            </div>
            <div class="stat-card">
              <span>正答数</span>
              <strong id="historyCorrect">0</strong>
            </div>
            <div class="stat-card">
              <span>連続正解</span>
              <strong id="historyStreak">0</strong>
            </div>
          </div>
          <div id="historyList" class="history-list"></div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
